# D2D Pipeline config — entry point that references all pipeline stage configs
#
# File resolution: program looks for each name as a yaml file
# relative to this pipeline config file location:
#
#   datasources/ <name>.yaml   e.g. datasources/prometheus_sample.yaml
#   analysis/    <name>.yaml   e.g. analysis/metric_sample.yaml
#   datasets/    <name>.yaml   e.g. datasets/metric_sample.yaml

datasources:
  - name: prometheus_sample   # -> datasources/prometheus_sample.yaml

analysis:
  - name: metric_sample       # -> analysis/metric_sample.yaml

datasets:
  - name: metric_sample       # -> datasets/metric_sample.yaml
